[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "binp51"
version = "0.1.0"
description = "eDNA biogeography"
readme = "README.md"
requires-python = ">=3.9"

# Core dependencies (loose versions for dev)
dependencies = [
    "pandas>=1.3",
    "snakemake>=7.0",
    "numpy>=1.20",
    "pydantic>=2.0",
    "fastapi>=0.131.0",
    "torch>=2.0",
    "transformers>=5.0",
    "sentence-transformers>=5.0",
    "chromadb>=1.5",
    "biopython>=1.86",
    "scikit-learn>=1.0",
    "requests>=2.30",
    "PyYAML>=6.0",
]

[project.optional-dependencies]
# Development tools. This will get install when we do make install-dev
dev = [
    "pytest>=7.0",
    "pytest-cov>=3.0",
    "ruff>=0.1.0",
    "black>=23.0",
    "isort>=5.0",
    "mypy>=1.0",
]

# Backend/ML dependencies (optional)
backend = [
    "torch>=2.0",
    "transformers>=5.0",
    "sentence-transformers>=5.0",
]

# RAG dependencies (optional)
rag = [
    "chromadb>=1.5",
    "docling>=2.70",
    "langchain>=0.1",
    "openai>=2.0",
]

# All extras
all = [
    "pytest>=7.0",
    "pytest-cov>=3.0",
    "ruff>=0.1.0",
    "black>=23.0",
    "isort>=5.0",
    "mypy>=1.0",
    "torch>=2.0",
    "transformers>=5.0",
    "sentence-transformers>=5.0",
    "chromadb>=1.5",
    "docling>=2.70",
    "langchain>=0.1",
    "openai>=2.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
select = ["E", "F", "C", "B", "I"]
ignore = ["E203"]
per-file-ignores = { "tests/*" = ["E402", "F401", "F811"] }

[tool.isort]
profile = "black"

[tool.black]
line-length = 88

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-v --tb=short"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
