services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: malmo
      POSTGRES_PASSWORD: malmo
      POSTGRES_DB: malmo_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malmo -d malmo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: microbiome:latest
    ports:
      - "8001:8000"
    env_file:
      - .env.local
    environment:
      - PYTHONPATH=/app
      - ENV_FILE=.env.local 
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
      - ./results:/app/results
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    command: ["uvicorn", "src.backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    image: microbiome:latest
    env_file:
      - .env.local
    environment:
      - PYTHONPATH=/app
      - ENV_FILE=.env.local 
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
      - ./results:/app/results
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    command: ["celery", "-A", "src.backend.celery_app:celery_app", "worker", "--loglevel=info", "--concurrency=2"]

volumes:
  postgres_data: