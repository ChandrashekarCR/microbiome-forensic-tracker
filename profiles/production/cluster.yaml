# Production Cluster Configuration
# Optimized resource allocation for 330 samples

__default__:
  account: "lu2025-2-11"
  partition: "lu48"
  time: "02:00:00"
  cpus: "4"
  mem: "8G"
  job_name: "prod_{rule}_{wildcards}"
  output: "logs/slurm/{rule}_{wildcards}_%j.out"
  error: "logs/slurm/{rule}_{wildcards}_%j.err"
  extra: ""

# High-throughput I/O tasks - lu48 nodes
fastqc_raw:
  partition: "lu48"
  time: "01:00:00"
  cpus: "8"          # More CPUs for faster processing
  mem: "16G"
  extra: "--array=1-10%5"  # Process in batches to avoid overwhelming

fastqc_processed:
  partition: "lu48"
  time: "01:00:00"
  cpus: "8"
  mem: "16G"
  extra: "--array=1-10%5"

fastp:
  partition: "lu48"
  time: "02:00:00"
  cpus: "8"
  mem: "32G"

adapter_removal:
  partition: "lu48"
  time: "04:00:00"
  cpus: "8"
  mem: "16G"

# Medium resource tasks - lu48 nodes with higher allocation
remove_human_reads:
  partition: "lu48"
  time: "06:00:00"
  cpus: "16"
  mem: "64G"

error_correction:
  partition: "lu48" 
  time: "08:00:00"
  cpus: "8"
  mem: "128G"      # Larger samples need more memory

multiqc:
  partition: "lu48"
  time: "01:00:00"
  cpus: "4"
  mem: "16G"

# Critical high-memory task - GPU nodes with job arrays
kraken:
  partition: "gpua40"
  time: "08:00:00"
  cpus: "32"
  mem: "450G"      # Maximum safe allocation
  extra: "--array=1-5%2"  # Process 5 samples at a time, max 2 concurrent GPU jobs

# Alternative kraken for overflow - use different GPU partitions
kraken_overflow:
  partition: "gpua100"
  time: "08:00:00"  
  cpus: "32"
  mem: "400G"
  extra: "--array=1-5%1"  # Backup partition

# Post-processing with batch optimization
bracken:
  partition: "lu48"
  time: "02:00:00"
  cpus: "8"
  mem: "32G"

standardize_bracken:
  partition: "lu48"
  time: "01:00:00"
  cpus: "4"
  mem: "16G"
  extra: "--array=1-20%10"  # Batch process multiple samples

merge_bracken:
  partition: "lu48"
  time: "02:00:00"
  cpus: "8"
  mem: "64G"       # More memory for merging 330 samples