# Production Profile for LUNARC - All 330 samples (OPTIMIZED)
# Usage: snakemake --profile profiles/production --cores 400
# Based on efficiency analysis: 20.7% memory reduction, 55.9% CPU reduction

# Basic cluster configuration
executor: slurm  
restart-times: 2

# High-throughput settings (OPTIMIZED)
cores: 400               # Reduced from 500 (55.9% CPU efficiency improvement)
jobs: 150               # Increased from 100 (more lightweight jobs now)
max-jobs-per-second: 25 # Increased for faster job submission
local-cores: 4          # More local cores for coordination

# Advanced job management
latency-wait: 60        # Longer wait for large-scale operations
keep-going: true

# Optimize for production
printshellcmds: false   # Reduce log verbosity

# Performance optimization
use-conda: true
conda-frontend: "mamba"

# Enable container execution natively
software-deployment-method: 
  - apptainer
  - conda

# Pass LUNARC binds to all container jobs globally
apptainer-args: "--bind /lunarc/nobackup/projects/snic2019-34-3:/lunarc/nobackup/projects/snic2019-34-3 --bind /home/chandru:/home/chandru"

# Efiicieny Reporting
slurm-efficiency-report: true
slurm-efficiency-report-path: "./logs/"

# Production resource allocation (OPTIMIZED based on efficiency data)
default-resources:
  slurm_account: lu2026-2-20
  slurm_partition: lu48
  runtime: "2h"
  mem_mb: 16000
  cpus: 2

set-resources:
  fastqc_raw:
    slurm_partition: "lu48"
    runtime: "1h"         
    cpus: 4               
    mem_mb: 4000          
    slurm_job_name: "prod_fastqc_raw"
  
  fastqc_processed:
    slurm_partition: "lu48" 
    runtime: "1h"
    cpus: 4               # Optimized from 4 (48.8% efficiency)
    mem_mb: 4000
    slurm_job_name: "prod_fastqc_processed"
  
  fastp:
    slurm_partition: "lu48"
    runtime: "1h"
    cpus: 4               # Keep 4 (94.3% efficiency - excellent)
    mem_mb: 500           # Optimized from 16000 (uses 30MB)
    slurm_job_name: "prod_fastp"
  
  adapter_removal:
    slurm_partition: "lu48"
    runtime: "1h"
    cpus: 3               # Optimized from 4 (64.9% efficiency)
    mem_mb: 1000          # Conservative for production
    slurm_job_name: "prod_adapter_removal"
  
  remove_human_reads:
    slurm_partition: "lu48"
    runtime: "2h"         # Extended for production scale
    cpus: 8               # Keep 8 (98.1% efficiency - excellent)
    mem_mb: 12000         # Conservative for larger samples
    slurm_job_name: "prod_remove_human_reads"

  error_correction:
    slurm_partition: "lu48"
    runtime: "2h"         # Extended for production scale
    cpus: 1               # Keep 1 (99.4% efficiency - excellent)
    mem_mb: 16000         # Conservative for larger samples
    slurm_job_name: "prod_error_correction"
  
  multiqc:
    slurm_partition: "lu48"
    runtime: "1h"
    cpus: 2
    mem_mb: 8000          # More memory for 330 samples
    slurm_job_name: "prod_multiqc"
  
  # High memory tasks - partition selected at runtime by select_best_partition()
  # in workflow/Snakefile (fills: aurora(4 nodes, 768GB) -> gpua40(6 nodes, 512GB) -> gpua40i(6 nodes, 512GB))
  # gpua100 EXCLUDED: account lu2025-2-11 has AssocGrpMemLimit on that partition
  kraken:
    # slurm_partition is intentionally NOT set here - the Snakefile lambda sets it
    runtime: "2h"
    cpus: 12
    mem_mb: 460000        # core-nt DB=310GB + index + buffers + OS ~= 400-420GB; 460GB = safe headroom
    slurm_job_name: "prod_kraken"
  
  bracken:
    slurm_partition: "lu48"
    runtime: "30m"
    cpus: 2               # Increased from 1 for production speed
    mem_mb: 6000           # Optimized from 16000
    slurm_job_name: "prod_bracken"
  
  standardize_bracken:
    slurm_partition: "lu48"
    runtime: "30m"
    cpus: 1
    mem_mb: 200           # Optimized from 8000
    slurm_job_name: "prod_standardize_bracken"
  
  merge_bracken:
    slurm_partition: "lu48"
    runtime: "1h"         # Extended for 330 samples
    cpus: 4               # Increased for faster merging
    mem_mb: 8000          # More memory for large merge operation
    slurm_job_name: "prod_merge_bracken"

  megahit_assembly:
    slurm_partition: "lu48"   # 256 GB RAM, 32 cores per node — optimal for MEGAHIT.
                              # MEGAHIT v1.2.9 has NO GPU support (--use-gpu was removed).
                              # gpua40/aurora have more RAM (512/768 GB) but are reserved
                              # for GPU workloads (Kraken2). Keep MEGAHIT on lu48.
                              # Speed comes from running many samples IN PARALLEL across
                              # multiple lu48 nodes, not from GPU or multi-node MPI.
    runtime: "12h"            # meta-sensitive runs 13 k-mer iterations; 6-18 h observed.
    cpus: 32                  # Use all cores on the lu48 node (MEGAHIT scales linearly).
    mem_mb: 200000            # 200 GB allocated; rule passes 90% (180 GB) to MEGAHIT
                              # via --memory in bytes, leaving headroom for OS overhead.
    slurm_job_name: "prod_megahit"
  
  dnaberts_embeddings:
    slurm_partition: "gpua40"
    slurm_extra: "--gpus-per-task=1"
    runtime: "60m"
    cpus: 12
    mem_mb: 32000
    slurm_job_name: "prod_naberts_embeddings"
