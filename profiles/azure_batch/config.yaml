# profiles/azure_batch/config.yaml
# Azure Batch equivalent of profiles/single_run/config.yaml
# Usage:
#   set -a; source .env.azure; set +a
#   snakemake --snakefile workflow/Snakefile \
#             --profile profiles/azure_batch \
#             --configfile config/config_single_run.yaml \
#             --config samples_file=config/samples_test.tsv

executor: azure-batch
restart-times: 1

# Azure Batch plugin settings
azure-batch-account-url: "${AZ_BATCH_ACCOUNT_URL}"
azure-batch-resource-group-name: "${AZ_BATCH_RESOURCE_GROUP_NAME}"
azure-batch-subscription-id: "${AZ_BATCH_SUBSCRIPTION_ID}"
azure-batch-account-name: "${AZ_BATCH_ACCOUNT_NAME}"
azure-batch-account-key: "${AZ_BATCH_ACCOUNT_KEY}"

# Azure Blob storage for Snakemake staging (optional; plugin will use these if present)
azure-blob-account-url: "${AZ_BLOB_ACCOUNT_URL}"
azure-blob-sas-token: "${AZ_BLOB_SAS_TOKEN}"

# Shared Filesystem Storage settings
default-storage-provider: fs
default-storage-prefix: /

# Job limits — tuned for the current 4-vCPU Batch quota
cores: 4
jobs: 2
max-jobs-per-second: 2
local-cores: 1

# Job management
latency-wait: 60
keep-going: true
printshellcmds: false

# Startup script runs on each Batch VMs before jobs start
azure-batch-node-start-task-url: "${BATCH_NODE_START_TASK_URL}"

# Use conda environments from main environment
#use-conda: true
#conda-frontend: "mamba"
#
## Container execution via Apptainer (no conda on Batch VMs)
#software-deployment-method:
#  - apptainer
#  - conda

apptainer-args: "${APPTAINER_BINDS}"

# Default resources — cheap VM for anything not specified
default-resources:
  az_batch_node_size: "Standard_D2as_v4"   # 2 vCPU, fits current quota
  runtime: "1h"
  mem_mb: 4000

# Per-rule VM sizes — mirrors your LUNARC partition choices
set-resources:

  fastqc_raw:
    az_batch_node_size: "Standard_D2as_v4"  # 2 vCPU, 16GB — same as lu48 2 cpus
    runtime: "30m"
    mem_mb: 1000

  fastqc_processed:
    az_batch_node_size: "Standard_D2as_v4"
    runtime: "30m"
    mem_mb: 1000

  fastp:
    az_batch_node_size: "Standard_D4as_v4"  # 4 vCPU, max size allowed by current quota
    runtime: "30m"
    mem_mb: 6000

  adapter_removal:
    az_batch_node_size: "Standard_D4as_v4"  # 4 vCPU, max size allowed by current quota
    runtime: "30m"
    mem_mb: 1000

  remove_human_reads:
    az_batch_node_size: "Standard_D4as_v4"  # reduced to stay within quota
    runtime: "45m"
    mem_mb: 6000

  error_correction:
    az_batch_node_size: "Standard_D4as_v4"  # 4 vCPU, max size allowed by current quota
    runtime: "1h"
    mem_mb: 8000

  multiqc:
    az_batch_node_size: "Standard_D2as_v4"
    runtime: "15m"
    mem_mb: 2000

  kraken:
    # Current quota cannot provision a large Kraken node; keep this as a smoke-test setting.
    # For the full core-nt DB, you must raise Azure vCPU quota and switch this back to a large memory VM.
    az_batch_node_size: "Standard_D4as_v4"
    runtime: "2h"
    mem_mb: 16000

  bracken:
    az_batch_node_size: "Standard_D2as_v4"
    runtime: "15m"
    mem_mb: 1000

  standardize_bracken:
    az_batch_node_size: "Standard_D2as_v4"
    runtime: "15m"
    mem_mb: 100

  merge_bracken:
    az_batch_node_size: "Standard_D2as_v4"
    runtime: "15m"
    mem_mb: 100