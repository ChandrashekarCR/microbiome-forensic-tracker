# Small Scale Profile for LUNARC - 5-10 samples
# Usage: snakemake --profile profiles/small_scale --cores 200

# Basic cluster configuration
executor: slurm
restart-times: 1

# Resource limits for small scale (OPTIMIZED based on efficiency data)
cores: 100  # Reduced from 200 (55.9% CPU efficiency improvement)
jobs: 25    # Increased from 20 (more lightweight jobs now)
max-jobs-per-second: 10  # Increased (faster job submission)
local-cores: 2        # Cores for local rules

# Job management
latency-wait: 30        # Wait time for files to appear
keep-going: true        # Continue on non-critical failures

# Output and logging
printshellcmds: false

# Use conda environments from main environment
use-conda: true
conda-frontend: "mamba"

# Efficieny Reporting
slurm-efficiency-report: true
slurm-efficiency-report-path: "./logs/"

# Resource sepcifications for each step
default-resources:
  slurm_account: lu2026-2-20
  slurm_partition: lu48
  runtime: "1h"
  mem_mb: 4000
  cpus: 2

set-resources:
  # Fast I/O tasks - OPTIMIZED based on efficiency data
  fastqc_raw:
    slurm_partition: "lu48"
    runtime: "30m"        # Reduced from 1h (completes in 3 min)
    cpus: 2               # Reduced from 4 (48.6% CPU efficiency)
    mem_mb: 2000           # Reduced from 8000 (uses 61MB peak)
    slurm_job_name: "fastqc_raw"
  
  fastqc_processed:
    slurm_partition: "lu48" 
    runtime: "30m"        # Reduced from 1h (completes in 2.3 min)
    cpus: 2               # Reduced from 4 (48.8% CPU efficiency)
    mem_mb: 2000           # Reduced from 8000 (uses <1MB peak)
    slurm_job_name: "fastqc_processed"
  
  fastp:
    slurm_partition: "lu48"
    runtime: "30m"        # Reduced from 2h (completes in 1.9 min)
    cpus: 4               # Keep 4 (94.3% CPU efficiency - excellent)
    mem_mb: 200           # Reduced from 16000 (uses 30MB peak)
    slurm_job_name: "fastp"
  
  adapter_removal:
    slurm_partition: "lu48"
    runtime: "30m"        # Reduced from 2h (completes in 10.3 min)
    cpus: 3               # Reduced from 4 (64.9% CPU efficiency)
    mem_mb: 500           # Reduced from 8000 (uses 135MB peak)
    slurm_job_name: "adapter_removal"
  
  remove_human_reads:
    slurm_partition: "lu48"
    runtime: "45m"        # Reduced from 3h (completes in 27 min)
    cpus: 8               # Keep 8 (98.1% CPU efficiency - excellent)
    mem_mb: 8000          # Reduced from 32000 (uses 3.8GB peak)
    slurm_job_name: "remove_human_reads"

  error_correction:
    slurm_partition: "lu48"
    runtime: "1h"        # Reduced from 4h (completes in 18.7 min)
    cpus: 1               # Keep 1 (99.4% CPU efficiency - excellent, single-threaded)
    mem_mb: 12000         # Reduced from 64000 (uses 5.9GB peak)
    slurm_job_name: "error_correction"
  
  multiqc:
    slurm_partition: "lu48"
    runtime: "15m"        # Reduced from 1h
    cpus: 1               # Reduced from 2
    mem_mb: 2000          # Reduced from 8000
    slurm_job_name: "multiqc"
  
  # High memory tasks - CRITICAL OPTIMIZATION
  kraken:
    slurm_partition: "gpua40"
    runtime: "30m"        # Reduced from 4h (completes in 11 min)
    cpus: 8               # Reduced from 30 (7% CPU efficiency - massive waste)
    mem_mb: 350000        # Reduced from 400000 (uses 298GB peak + buffer)
    slurm_job_name: "kraken"
  
  bracken:
    slurm_partition: "lu48"
    runtime: "15m"        # Reduced from 1h (completes in seconds)
    cpus: 1               # Keep 1 (97.2% CPU efficiency - excellent)
    mem_mb: 3000           # Reduced from 16000 (uses <1MB peak)
    slurm_job_name: "bracken"
  
  standardize_bracken:
    slurm_partition: "lu48"
    runtime: "15m"        # Reduced from 1h (completes in seconds)
    cpus: 1               # Keep 1
    mem_mb: 100           # Reduced from 8000 (uses <1MB peak)
    slurm_job_name: "standardize_bracken"
  
  merge_bracken:
    slurm_partition: "lu48"
    runtime: "15m"        # Reduced from 1h (completes in seconds)
    cpus: 1               # Keep 1 (73.5% efficiency - good)
    mem_mb: 100           # Reduced from 16000 (uses <1MB peak)
    slurm_job_name: "merge_bracken"

  megahit_assembly:
    slurm_partition: "lu48"   # 256 GB RAM, 32 cores per node — optimal for MEGAHIT.
                              # MEGAHIT v1.2.9 has NO GPU support (--use-gpu was removed).
                              # gpua40/aurora have more RAM (512/768 GB) but are reserved
                              # for GPU workloads (Kraken2). Keep MEGAHIT on lu48.
                              # Speed comes from running many samples IN PARALLEL across
                              # multiple lu48 nodes, not from GPU or multi-node MPI.
    runtime: "24h"            # meta-sensitive runs 13 k-mer iterations; 6-18 h observed.
    cpus: 32                  # Use all cores on the lu48 node (MEGAHIT scales linearly).
    mem_mb: 200000            # 200 GB allocated; rule passes 90% (180 GB) to MEGAHIT
                              # via --memory in bytes, leaving headroom for OS overhead.
    slurm_job_name: "megahit"