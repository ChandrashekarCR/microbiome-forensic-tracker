# Small Scale Profile for LUNARC - 5-10 samples
# Usage: snakemake --profile profiles/small_scale --cores 200

# Basic cluster configuration
executor: slurm
restart-times: 1
default-resources:
  - slurm_account=lu2025-2-11
  - slurm_partition=lu48
  - runtime=60
  - mem_mb=4000
  - cpus=2

# Resource limits for small scale
cores: 200  # Total cores across cluster
jobs: 20    # Max concurrent SLURM jobs (conservative for small scale)
max-jobs-per-second: 5  # Prevent job spam
local-cores: 2        # Cores for local rules

# Job management
latency-wait: 30        # Wait time for files to appear
keep-going: true        # Continue on non-critical failures

# Cluster configuration file

# Output and logging
printshellcmds: true

# Use conda environments from main environment
use-conda: true
conda-frontend: "mamba"