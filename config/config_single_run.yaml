# Project Configuration
project_name: "malmo_metagenomics_pipeline"
author: "ChandrashekarCR"
version: "1.0"

# Data Directories
data:
  raw_dir: "/home/chandru/binp51/data/malmo_samples/01_fastq_test_samples"
  results_dir : "/home/chandru/binp51/results"

# Sample Configuration
samples:
  sample_sheet: "config/samples_single_run.tsv" # Sample sheet. This is not a real file. It is just a default placeholder
  pattern_r1: "_R1.fastq.gz"
  pattern_r2: "_R2.fastq.gz"
  max_samples: 15 # Running 4 samples
  read_length: 150

# Tool paths (Container images)
tools:
  fastqc: "bin/fastqc.sif"
  fastp: "bin/fastp.sif"
  adapter_removal: "bin/adapter_removal.sif"
  multiqc: "bin/multiqc.sif"
  bowtie2: "bin/bowtie2.sif"
  samtools: "bin/samtools.sif"
  repair: "bin/bbmap/repair.sh"
  tadpole: "bin/bbmap/tadpole.sh"
  bbduk: "bin/bbmap/bbduk.sh"
  spades: "bin/spades.sif"
  kraken2: "bin/kraken2.sif"
  bracken: "bin/bracken.sif"
  megahit: "bin/megahit.sif"

# Reference Database
databases:
  human_genome: "/lunarc/nobackup/projects/snic2019-34-3/Daria/CAMP/ref_Human_hg38/ref_Human_hg38/hg38_ref/hg38_index"
  kraken2_db: "/lunarc/nobackup/projects/snic2019-34-3/Daria/core_nt_Database/"
  common_adapters: "bin/common_adapters.txt"

# Analysis Parameters:
parameters:
  # Quality Control
  fastp:
    qualified_quality_phred: 30
    trim_poly_g: true
    dont_eval_duplication: true

  # Adapter removal
  adapter_removal:
    trimns: true
    trimqualities: true

  # Remove human reads
  bowtie2:
    sensitivity: "very-sensitive"

  # Error correction
  error_correction:
    memory_gb: 20
    k_size: 25
    conservative: true
    ecc: true
    reassemble: true
    aggressive: false

  # Taxonomic classification
  kraken:

  bracken:

  # Assembly
  megahit:
    # min_contig_len: output anything >=500 bp from MEGAHIT itself.
    # The filter_contigs rule will then apply the DNA-BERT-S window of 1000–10000 bp.
    # Keeping 500 here avoids re-running MEGAHIT if the filter threshold changes later.
    min_contig_len: 500

    # preset: selects the k-mer schedule automatically.
    # v1.2.9 presets available:
    #   meta-sensitive : --min-count 1 --k-list 21,29,39,49,...,129,141
    #     Fine k-mer steps (step≈10) up to k=141. Best for gut/oral metagenomics
    #     where sensitivity matters more than speed. Each extra k size adds ~10-20
    #     min per sample but produces longer, more contiguous contigs for DNA-BERT-S.
    #   meta-large     : --k-min 27 --k-max 127 --k-step 10
    #     Coarser steps; designed for soil/environmental with very complex communities.
    #     Faster than meta-sensitive.
    #preset: "meta-sensitive"

    # Custom k-list to capture only
    k_list: "21,31,41,51,61,71,81,91,101,121,141"

    # min_count=2: Discard k-mers seen only once (likely sequencing errors).
    # Soil has extreme diversity + residual errors even after tadpole.
    # This reduces memory, speeds assembly, and filters chimeric contigs
    # without losing organisms that would assemble to 1000+ bp anyway.
    min_count: 2


# Taxonomic Ranks
taxonomy:
  ranks: ['species','genus','family','order','class','phylum']

# Resource allocation for each rule
resources:
  fastqc:
    mem_mb: 1000         
    runtime_min: 30      
    threads: 2           
  
  fastp:
    mem_mb: 500          
    runtime_min: 30      
    threads: 4           
  
  adapter_removal:
    mem_mb: 1000         
    runtime_min: 30      
    threads: 3           

  bowtie2:
    mem_mb: 12000        
    runtime_min: 45      
    threads: 8           
  
  error_correction:
    mem_mb: 16000        
    runtime_min: 30      
    threads: 1           

  multiqc:
    mem_mb: 2000         
    runtime_min: 15      
  
  kraken2:
    mem_mb: 460000        # core-nt DB=310GB + index + buffers + OS ~= 400-420GB; 460GB = safe headroom
    runtime_min: 120      # 2 hours - kraken2 on large samples can take 60-90 min
    threads: 12          
  
  bracken:
    mem_mb: 2000         
    runtime_min: 15      

  megahit:
    # threads: lu48 nodes have 32 physical cores. Using all of them maximises
    # throughput per sample. Each sample is a separate SLURM job on its own node,
    # so there is no contention between samples.
    threads: 32

    # mem_mb: lu48 nodes have 256 GB. We request 200 GB leaving ~56 GB for the OS,
    # SLURM overhead, and the apptainer/glibc layers.
    # In assembly.smk, MEGAHIT is given 90% of this (180 GB) via --memory in bytes.
    mem_mb: 200000

    # runtime_min: 24 h (1440 min). Complex metagenomes with 150 bp reads and
    # meta-sensitive (13 k-mer iterations) can take 6-18 h per sample.
    # The profile can override this with a shorter wall time once you have benchmarks.
    runtime_min: 1440


# Pipeline Control
pipeline:
  steps:
    fastqc_raw: true
    fastp: true
    adapter_removal: true
    host_removal: true
    error_correction: true
    fastqc_post: true
    multiqc: true
    kraken2: true
    bracken: true
    standardize_bracken: true
