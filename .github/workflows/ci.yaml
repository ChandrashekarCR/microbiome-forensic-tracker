name: CI/CD pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  # Stage 1: Linting
  lint-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install linting tools
        run: |
          echo "Setting up virtual environment..."
          make BASE_PYTHON=python3.11 venv-all
          echo "Linting tools installed successfully!"

      - name: Code format
        run: make format 

  # Stage 2: Run unit tests
  test:
    name: Run Unit Tests
    needs: lint-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          echo "Setting up virtual environment..."
          make BASE_PYTHON=python3.11 venv-all
          echo "Linting tools installed successfully!"

      - name: Run Pytest
        run: make test

