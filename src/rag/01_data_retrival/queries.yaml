# queries.yaml
# Targeted search terms for Skane/Sweden/Scandinavia microbiome data

# ─────────────────────────────────────────────────────────────────────────────
# Targeted PubMed queries for Skåne / Sweden / Scandinavia microbiome research
#
# WHY BROAD QUERIES WORK:
#   You do NOT need papers limited to Malmö.  Any paper that says:
#   "Bacteroides was dominant in sewage" gives you the association
#   "Bacteroides → sewage".  The forensic value comes from knowing WHICH
#   organism lives WHERE — the geography of the PAPER is secondary to
#   the ecology of the ORGANISM.  Sweden-specific papers are prioritised
#   because local climate, hydrology and land-use affect which taxa dominate,
#   but global references are equally valid for universal associations.
#
# PRIORITY ORDER (top = highest priority):
#   1. Sweden / Skåne / Malmö specific
#   2. Scandinavian / Nordic / Baltic
#   3. General European temperate ecology
#   4. Universal microbe-environment associations
# ─────────────────────────────────────────────────────────────────────────────

queries:

  # ── 1. Sweden / Skåne geographic + microbiome ────────────────────────────
  - "soil microbiome Sweden Skane eDNA"
  - "bacterial community soil Malmö Sweden"
  - "16S rRNA microbiome Sweden grassland forest agricultural soil"
  - "metagenomics environmental Sweden Scandinavia microbial diversity"
  - "microbial ecology Skåne Sweden habitat microorganism"
  - "eDNA metabarcoding Sweden species distribution freshwater"
  - "microbiome urban rural Sweden gradient land use"

  # ── 2. Forensic microbiology ─────────────────────────────────────────────
  - "forensic soil microbiome DNA geolocation provenance"
  - "forensic eDNA bacteria crime scene soil transfer"
  - "soil bacteria forensic investigation geographic origin"
  - "microbiome geolocation forensic Scandinavia Norway Sweden"
  - "forensic microbiology trace evidence soil bacteria"
  - "microbial community crime scene forensic profiling"
  - "microbiome provenance soil forensic 16S"
  - "bacterial fingerprint soil geographic location"

  # ── 3. Sewage / wastewater (highly relevant: crime scenes near water) ────
  - "sewage wastewater microbiome Sweden bacterial community"
  - "wastewater treatment plant microbial community Scandinavia"
  - "activated sludge microbiome bacteria Europe"
  - "sewage bacteria Bacteroides Escherichia urban environment"
  - "antibiotic resistance genes wastewater Sweden"

  # ── 4. Soil environments ─────────────────────────────────────────────────
  - "urban garden soil bacteria Sweden park microbiome"
  - "agricultural soil microbiome Skane Sweden farming"
  - "forest soil microbiome Sweden beech oak Fagus Quercus"
  - "wetland soil microbiome Scandinavia Sweden peat bog"
  - "roadside soil microbiome urban contamination bacteria"
  - "playground soil bacteria children urban Sweden"
  - "compost microbiome bacteria fungi decomposition"

  # ── 5. Aquatic / coastal environments ────────────────────────────────────
  - "coastal marine sediment bacteria Sweden Baltic Sea microbiome"
  - "freshwater lake river microbiome Sweden Scandinavia bacteria"
  - "Baltic Sea microbiome bacteria sediment water column"
  - "benthic microbiome coastal sediment Sweden"
  - "drinking water microbiome Sweden bacteria"

  # ── 6. Trees and plant-associated (Skåne has beech, oak, elm) ───────────
  - "rhizosphere bacteria beech Fagus sylvatica Scandinavia soil"
  - "tree associated microbiome oak Quercus Sweden forest"
  - "phyllosphere bacteria Sweden plant leaf microbiome"
  - "mycorrhizal fungi Sweden forest soil ecology"
  - "litter decomposition bacteria fungi Sweden forest floor"

  # ── 7. Indoor / built environment (crime scenes often indoors) ───────────
  - "indoor dust microbiome Sweden built environment bacteria"
  - "house dust microbiome Scandinavia bacteria fungi"
  - "hospital microbiome bacteria Sweden indoor"
  - "office building microbiome Scandinavia airborne bacteria"

  # ── 8. Organism-environment references (universal) ───────────────────────
  - "Bacteroidetes soil environment habitat dominant association"
  - "Proteobacteria urban soil garden bacteria ecology abundance"
  - "Actinobacteria forest soil Scandinavia distribution"
  - "Firmicutes anaerobic environment sewage soil"
