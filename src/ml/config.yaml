# config.yaml
database:
  path: "/home/chandru/binp51/databases/malmo.db"
  table: "malmo_phylum"

data_splitting:
  test_size: 0.2
  random_state: 42
  n_splits: 7
  n_repeats: 3

mlflow:
  experiment_name: "Microbiome_Geolocation"
  tracking_uri: "http://127.0.0.1:5001"

# Pipeline excecution
pipeline_excecution:
  allowed_families: ["tree"]
  cv_strategy: "group_kfold" # Options: "loo" (Leave-One-Out), "repeated_kfold", "stratified", "group_kfold"
  use_cartesian_meters: true 


# Stage 1: Baseline Models with Metadata & Switches
stage_1:
  XGBoost:
    enabled: true
    family: "tree"
    params:
      n_estimators: 100
      max_depth: 4
      learning_rate: 0.1
      random_state: 42
      objective: "reg:squarederror"

  RandomForest:
    enabled: true
    family: "tree"
    params:
      n_estimators: 200
      max_depth: 10
      max_features: "sqrt" # limits features per split
      min_samples_leaf: 3 # prevents overfitting
      random_state: 42
      n_jobs: -1

  RidgeRegression:
    enabled: true
    family: "linear"
    params:
      alpha: 1.0
      random_state: 42
  
  ElasticNet:
    enabled: true
    family: "linear"
    params:
      alpha: 1.0
      l1_ratio: 0.5
  
  ExtraTreesRegressor:
    enabled: true  
    family: "tree"
    params:
      n_estimators: 200
      max_features: "sqrt"
      random_state: 42

  
# Stage 2: Is the same models parameters but with feature engineering
# There are no major changes for the model parameters here
# Parameters to pass to the feature engineering
feature_engineering:
  min_prevalance: 0.05
  use_network_features: true
  cv_folds: 3
  max_iter: 2000
  top_k_edges: 200
  k_best_features: 64
  min_abundance: 1e-6
  delta_value: 1e-6


# Stage 3: Tuned hyperparameters (only for top 5)
stage_3:
  enabled: false
  n_iter: 20
  cv_folds: 3
  random_state: 42
  grids:
    XGBoost:
      n_estimators: [200, 400, 600]
      max_depth: [3, 4, 6]
      learning_rate: [0.01, 0.05, 0.1]
      subsample: [0.7, 0.9, 1.0]
      colsample_bytree: [0.7, 0.9, 1.0]

    RandomForest:
      n_estimators: [200, 400, 600, 800]
      max_depth: [5, 8, 10, 15, 20]        # drop null and 30 — too unconstrained at n=263
      min_samples_split: [2, 5, 10, 20]
      min_samples_leaf: [2, 4, 8]          # drop 1 — single-sample leaves overfit badly
      max_features: ['sqrt', 'log2', 0.3, 0.5]
      min_impurity_decrease: [0.0, 1e-6, 1e-5]
      criterion: ['squared_error', 'friedman_mse']   # drop absolute_error, too slow
      bootstrap: [True]                     # lock this on — don't let search disable it
      min_weight_fraction_leaf: [0.0, 0.01]
      max_leaf_nodes: [50, 100, 200]        # drop null
  
  # Parallelism (set via n_jobs in your pipeline, not part of grid)

    LightGBM:
      n_estimators: [200, 400]
      learning_rate: [0.01, 0.05, 0.1]
      num_leaves: [31, 63, 127]

 