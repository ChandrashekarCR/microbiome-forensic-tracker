# config.yaml
database:
  path: "/home/chandru/binp51/databases/malmo.db"
  table: "malmo_species"

data_splitting:
  test_size: 0.2
  random_state: 42
  n_splits: 3
  n_repeats: 5

mlflow:
  experiment_name: "Microbiome_Geolocation"
  tracking_uri: "http://127.0.0.1:5001"

# Pipeline excecution
pipeline_excecution:
  allowed_families: ["tree"]
  cv_strategy: "repeated_kfold" # Options: "loo" (Leave-One-Out), "repeated_kfold", "stratified"
  use_cartesian_meters: true 


# Stage 1: Baseline Models with Metadata & Switches
stage_1:
  XGBoost:
    enabled: true
    family: "tree"
    params:
      n_estimators: 100
      max_depth: 4
      learning_rate: 0.1
      random_state: 42
      objective: "reg:squarederror"

  RandomForest:
    enabled: false
    family: "tree"
    params:
      n_estimators: 100
      max_depth: 10
      random_state: 42
      n_jobs: -1

  LightGBM:
    enabled: false  # Easily turn off models you aren't testing
    family: "tree"
    params:
      n_estimators: 200
      learning_rate: 0.05
      max_depth: -1
      random_state: 42
      n_jobs: -1

  RidgeRegression:
    enabled: false
    family: "linear"
    params:
      alpha: 1.0
      random_state: 42

  NeuralNetwork:
    enabled: false
    family: "nn"
    params:
      hidden_layer_sizes: [64, 32]
      max_iter: 500
      random_state: 42

  
# Stage 2: Is the same models parameters but with feature engineering
# There are no major changes for the model parameters here
# Parameters to pass to the feature engineering
feature_engineering:
  min_prevalence: 0.05
  use_network_features: true
  cv_folds: 5
  max_iter: 5000
  top_k_edges: 20


# Stage 3: Tuned hyperparameters (only for top 5)
stage_3:
  enabled: false
  n_iter: 20
  cv_folds: 3
  random_state: 42
  grids:
    XGBoost:
      n_estimators: [200, 400, 600]
      max_depth: [3, 4, 6]
      learning_rate: [0.01, 0.05, 0.1]
      subsample: [0.7, 0.9, 1.0]
      colsample_bytree: [0.7, 0.9, 1.0]

    RandomForest:
      n_estimators: [200, 400, 600]
      max_depth: [8, 12, null]
      min_samples_split: [2, 5, 10]
      min_samples_leaf: [1, 2, 4]

    LightGBM:
          n_estimators: [200, 400]
          learning_rate: [0.01, 0.05, 0.1]
          num_leaves: [31, 63, 127]

 