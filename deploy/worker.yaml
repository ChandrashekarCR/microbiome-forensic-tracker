location: swedencentral
resourceGroup: microbiome-rg
type: Microsoft.App/containerApps
name: microbiome-worker
properties:
  managedEnvironmentId: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/microbiome-rg/providers/Microsoft.App/managedEnvironments/microbiome-env
  configuration:
    registries:
      - server: microbiomeacr.azurecr.io
        username: microbiomeacr
        passwordSecretRef: acr-password
    secrets:
      - name: acr-password
        value: <ACR_PASSWORD>
  template:
    scale:
      minReplicas: 1
      maxReplicas: 1
    volumes:
      - name: microbiome-data
        storageType: AzureFile
        storageName: microbiome-data
    containers:
      - name: microbiome-worker
        image: microbiomeacr.azurecr.io/microbiome:latest
        command: ["celery"]
        args: ["-A", "src.backend.celery_app:celery_app", "worker", "--loglevel=info", "--concurrency=2"]
        volumeMounts:
          - volumeName: microbiome-data
            mountPath: /mnt/data
        env:
          - name: PYTHONPATH
            value: /app
          - name: ENV_FILE
            value: .env.azure
          - name: PROJECT_ROOT
            value: /app
          - name: UPLOAD_DIR
            value: /mnt/data/uploads
          - name: RESULTS_DIR
            value: /mnt/data/results
          - name: LOGS_DIR
            value: /mnt/data/logs
          - name: RUNTIME_DIR
            value: /mnt/data/runtime
          - name: BACKEND_DB_URL
            value: "postgresql://<PG_USER>:<PG_PASSWORD>@microbiome-postgres.postgres.database.azure.com:5432/malmo_db"
          - name: CELERY_BROKER_URL
            value: "redis://:<REDIS_PASSWORD>@20.91.202.193:6379/0"
          - name: CELERY_RESULT_BACKEND
            value: "redis://:<REDIS_PASSWORD>@20.91.202.193:6379/0"
          - name: SNAKEMAKE_PROFILE
            value: profiles/azure_batch
          - name: SNAKEMAKE_CONFIG
            value: config/config_single_run.yaml
          - name: SNAKEMAKE_BIN
            value: snakemake
          - name: SNAKEMAKE_TOOLS
            value: /mnt/blob/tools
          - name: KRAKEN2_DB
            value: /mnt/blob/databases/core_nt_Database
          - name: HUMAN_GENOME_DIR
            value: /mnt/blob/databases/hg38_ref
          - name: HUMAN_GENOME_INDEX
            value: hg38_index
          - name: AZ_BATCH_ACCOUNT_URL
            value: https://microbiomebatch.swedencentral.batch.azure.com
          - name: AZ_BATCH_ACCOUNT_KEY
            value: <YOUR_ROTATED_KEY>
          - name: AZ_BLOB_ACCOUNT_URL
            value: "https://ednamicrobiomestorage.blob.core.windows.net/?<SAS>"
          - name: AZ_BLOB_PREFIX
            value: uploads
          - name: APPTAINER_BINDS
            value: "--bind /mnt/blob:/mnt/blob --bind /mnt/data:/mnt/data"